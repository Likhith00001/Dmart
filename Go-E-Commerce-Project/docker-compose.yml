services:
  postgres:
    image: postgres:16-alpine
    container_name: ecommerce-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: user_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ecommerce-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  user-service:
    build:
      context: .
      dockerfile: user-service/docker/Dockerfile
    container_name: ecommerce-user-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      SERVER_ENV: development
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/user_db?sslmode=disable
      JWT_SECRET: super-secret-jwt-key-change-in-production
      JWT_EXPIRY: 7200
    depends_on:
      postgres:
        condition: service_healthy

  product-service:
    build:
      context: .
      dockerfile: product-service/docker/Dockerfile
    container_name: ecommerce-product-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
      SERVER_ENV: development
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/product_db?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
  
  order-service:
    build:
      context: .
      dockerfile: order-service/docker/Dockerfile
    container_name: ecommerce-order-service
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      SERVER_PORT: 8083
      SERVER_ENV: development
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/order_db?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
volumes:
  postgres_data:
  redis_data: